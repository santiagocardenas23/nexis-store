<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITEC SAS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020817;color:white;font-family:Arial,sans-serif}
header{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:#071226;border-bottom:1px solid #16314f}
.logo{font-size:42px;font-weight:800;font-family:'Syne',sans-serif;color:#38BDF8}
.top-buttons button{background:#0f172a;color:white;border:1px solid #16314f;padding:12px 20px;border-radius:14px;cursor:pointer;font-weight:bold;font-size:15px}
.hero{padding:80px 40px;text-align:center}
.hero h1{font-size:82px;font-family:'Syne',sans-serif;line-height:1;margin-bottom:20px}
.hero span{color:#38BDF8}
.hero p{font-size:20px;color:#94a3b8;max-width:800px;margin:auto;line-height:1.7}
.filters{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:20px}
.filter-btn{background:#0f172a;border:1px solid #16314f;color:white;padding:12px 22px;border-radius:999px;cursor:pointer;font-size:15px}
.filter-btn.active,.filter-btn:hover{background:#38BDF8;color:black;font-weight:bold}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;padding:40px}
.card{background:#071226;border:1px solid #16314f;border-radius:24px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:260px;object-fit:cover;background:white}
.card-no-img{width:100%;height:260px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:64px}
.card-content{padding:22px}
.category{font-size:13px;letter-spacing:2px;color:#38BDF8;margin-bottom:10px;text-transform:uppercase}
.card h3{font-size:30px;font-family:'Syne',sans-serif;margin-bottom:10px}
.card p{color:#94a3b8;line-height:1.7;margin-bottom:18px}
.price{font-size:36px;font-weight:800;color:#38BDF8;margin-bottom:20px}
.card button{width:100%;padding:14px;border:none;border-radius:14px;background:#38BDF8;font-weight:bold;cursor:pointer;font-size:16px}
/* MODAL */
.product-modal,.cart-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;justify-content:center;align-items:flex-start;z-index:999;padding:2rem;overflow-y:auto}
.product-container{background:white;color:black;width:1100px;max-width:100%;border-radius:28px;overflow:hidden;position:relative;margin:auto}
.product-top{display:grid;grid-template-columns:1fr 1fr}
.product-left{background:#f0f0f0;padding:2rem;display:flex;align-items:center;justify-content:center;min-height:400px}
.product-left img{width:100%;max-width:440px;object-fit:contain;border-radius:12px;max-height:420px}
.product-right{padding:2.5rem;overflow-y:auto;max-height:90vh}
.brand{color:#38BDF8;font-weight:bold;font-size:13px;letter-spacing:2px;text-transform:uppercase}
.product-right h1{font-size:36px;margin:.5rem 0;font-family:'Syne',sans-serif;line-height:1.1}
.price-big{font-size:48px;font-weight:800;color:#38BDF8;margin-bottom:1rem}
.close-modal{position:absolute;top:16px;right:16px;width:40px;height:40px;border:none;border-radius:12px;background:black;color:white;font-size:18px;cursor:pointer;z-index:10}
.tabs-nav{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:1.5rem}
.tab-nav-btn{padding:10px 18px;font-size:14px;background:transparent;border:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:600}
.tab-nav-btn.active{color:#38BDF8;border-bottom-color:#38BDF8}
.tab-content{display:none}
.tab-content.active{display:block}
.specs-table{width:100%;border-collapse:collapse;font-size:14px}
.specs-table tr:nth-child(even){background:#f9fafb}
.specs-table td{padding:10px 14px;border-bottom:1px solid #e5e7eb;vertical-align:top}
.specs-table td:first-child{color:#6b7280;width:40%;font-weight:600}
.specs-table td:last-child{color:#111;font-weight:500}
.desc-block{font-size:14px;line-height:1.9;color:#444}
.desc-block h3{font-size:15px;font-weight:700;margin:1rem 0 .4rem;color:#111}
.desc-list{list-style:disc;padding-left:1.25rem;margin:.5rem 0}
.desc-list li{margin-bottom:.3rem}
.guarantee-badge{display:inline-block;background:#dcfce7;color:#166534;border-radius:8px;padding:6px 14px;font-weight:700;font-size:13px;margin-top:1rem}
.buy-btn{width:100%;padding:14px;border:none;border-radius:14px;background:#38BDF8;font-weight:bold;cursor:pointer;font-size:16px;margin-top:1rem}
.cart-box{background:#071226;width:440px;max-width:100%;border-radius:24px;padding:24px;margin:auto}
.cart-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #16314f}
.cart-total{font-size:26px;font-weight:800;color:#38BDF8;margin-top:20px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#0f172a;color:#38BDF8;border:1px solid #16314f;padding:.75rem 1.5rem;border-radius:12px;font-weight:bold;z-index:9999;display:none}
footer{padding:50px;text-align:center;color:#94a3b8}
@media(max-width:768px){
  .product-top{grid-template-columns:1fr}
  .hero h1{font-size:42px}
  header{padding:16px 20px}
}
</style>
</head>
<body>

<header>
  <div class="logo">SITEC SAS</div>
  <div class="top-buttons">
    <button onclick="toggleCart()">&#128722; Carrito (<span id="cartCount">0</span>)</button>
  </div>
</header>

<section class="hero">
  <h1>Tu proximo <span>nivel digital</span></h1>
  <p>Los mejores dispositivos, computadores y accesorios gamer.</p>
</section>

<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('all',this)">Todos</button>
  <button class="filter-btn" onclick="filterProducts('laptop',this)">Laptops</button>
  <button class="filter-btn" onclick="filterProducts('movil',this)">Moviles</button>
  <button class="filter-btn" onclick="filterProducts('gaming',this)">Gaming</button>
  <button class="filter-btn" onclick="filterProducts('accesorio',this)">Accesorios</button>
</div>

<section class="products" id="productsSection"></section>

<div class="product-modal" id="productModal">
  <div class="product-container">
    <button class="close-modal" onclick="closeProduct()">X</button>
    <div class="product-top">
      <div class="product-left">
        <img id="modalImage" src="" alt="">
      </div>
      <div class="product-right">
        <span class="brand">SITEC SAS</span>
        <h1 id="modalTitle"></h1>
        <div class="price-big" id="modalPrice"></div>
        <div class="tabs-nav">
          <button class="tab-nav-btn active" onclick="switchTab(this,'tabDesc')">Descripcion</button>
          <button class="tab-nav-btn" onclick="switchTab(this,'tabSpecs')">Especificaciones</button>
          <button class="tab-nav-btn" onclick="switchTab(this,'tabWarranty')">Garantia</button>
        </div>
        <div class="tab-content active" id="tabDesc"></div>
        <div class="tab-content" id="tabSpecs"></div>
        <div class="tab-content" id="tabWarranty"></div>
        <button class="buy-btn" onclick="addToCart()">Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>

<div class="cart-modal" id="cartModal">
  <div class="cart-box">
    <h2 style="margin-bottom:1rem">Carrito de compras</h2>
    <div id="cartItems"><p style="color:#94a3b8">No hay productos aun.</p></div>
    <div class="cart-total" id="cartTotal">Total: $0</div>
    <br>
    <button onclick="toggleCart()" style="width:100%;padding:12px;border:none;border-radius:12px;background:#38BDF8;font-weight:bold;cursor:pointer;font-size:15px">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<footer>© 2026 SITEC SAS</footer>

var cart = [];
var currentProduct = null;

function renderProducts(filter) {
  var section = document.getElementById('productsSection');
  var list = filter === 'all' ? products : products.filter(function(p){ return p.category === filter; });
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var imgHtml = p.image
      ? '<img src="' + p.image + '" alt="' + p.name + '">'
      : '<div class="card-no-img">&#128246;</div>';
    html += '<div class="card" data-category="' + p.category + '">';
    html += imgHtml;
    html += '<div class="card-content">';
    html += '<div class="category">' + p.category.toUpperCase() + '</div>';
    html += '<h3>' + p.name + '</h3>';
    html += '<p>' + p.shortDesc + '</p>';
    html += '<div class="price">' + p.price + '</div>';
    html += '<button onclick="openProduct(' + p.id + ')">Ver producto</button>';
    html += '</div></div>';
  }
  section.innerHTML = html;
}

function openProduct(id) {
  var p = null;
  for (var i = 0; i < products.length; i++) {
    if (products[i].id === id) { p = products[i]; break; }
  }
  if (!p) return;
  currentProduct = p;
  document.getElementById('productModal').style.display = 'flex';
  document.getElementById('modalTitle').innerText = p.name;
  document.getElementById('modalPrice').innerText = p.price;
  var img = document.getElementById('modalImage');
  if (p.image) { img.src = p.image; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
  document.getElementById('tabDesc').innerHTML = p.desc;
  var specsHtml = '<table class="specs-table">';
  for (var j = 0; j < p.specs.length; j++) {
    specsHtml += '<tr><td>' + p.specs[j][0] + '</td><td>' + p.specs[j][1] + '</td></tr>';
  }
  specsHtml += '</table>';
  document.getElementById('tabSpecs').innerHTML = specsHtml;
  document.getElementById('tabWarranty').innerHTML = '<div class="desc-block"><p>' + p.warranty + '</p></div>';
  var btns = document.querySelectorAll('.tab-nav-btn');
  var tabs = document.querySelectorAll('.tab-content');
  for (var k = 0; k < btns.length; k++) btns[k].classList.remove('active');
  for (var l = 0; l < tabs.length; l++) tabs[l].classList.remove('active');
  btns[0].classList.add('active');
  document.getElementById('tabDesc').classList.add('active');
}

function closeProduct() {
  document.getElementById('productModal').style.display = 'none';
}

function switchTab(btn, tabId) {
  var btns = document.querySelectorAll('.tab-nav-btn');
  var tabs = document.querySelectorAll('.tab-content');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function addToCart() {
  if (!currentProduct) return;
  cart.push(currentProduct);
  updateCart();
  showToast(currentProduct.name + ' agregado al carrito');
}

function updateCart() {
  document.getElementById('cartCount').innerText = cart.length;
  var cartItems = document.getElementById('cartItems');
  var cartTotal = document.getElementById('cartTotal');
  if (!cart.length) {
    cartItems.innerHTML = '<p style="color:#94a3b8">No hay productos aun.</p>';
    cartTotal.innerText = 'Total: $0';
    return;
  }
  var html = '';
  var total = 0;
  for (var i = 0; i < cart.length; i++) {
    html += '<div class="cart-item"><span style="color:white">' + cart[i].name + '</span><span style="color:#38BDF8;font-weight:bold">' + cart[i].price + '</span></div>';
    total += cart[i].priceNum;
  }
  cartItems.innerHTML = html;
  cartTotal.innerText = 'Total: $' + total.toLocaleString('es-CO');
}

function toggleCart() {
  var modal = document.getElementById('cartModal');
  modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
}

function filterProducts(category, button) {
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  button.classList.add('active');
  renderProducts(category);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

renderProducts('all');
